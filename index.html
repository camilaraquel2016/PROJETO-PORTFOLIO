<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfólio de Sabrina Carpenter — Desenvolvedora Full Stack e Designer UI/UX."
    />
    <title>Sabrina Carpenter | Portfólio</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="header" id="header"></header>

    <main class="main" id="main">
      <!-- HOME -->
      <section class="home section" id="home">
        <div class="home-grid container grid">
          <div class="home-texto">
            <h3 class="home-saudacao">
              Oi, eu sou
              <span class="home-nome">Sabrina Carpenter</span>
            </h3>
            <h1 class="home-cargo">
              Designer & <br /><span id="home-profissao"
                >Full Stack Developer</span
              >
            </h1>
            <p class="home-bio">
              Apaixonada por <span>tecnologia</span>, <span>design</span> e
              <span>desenvolvimento web</span>, unindo criatividade e inovação
              em cada projeto.
            </p>
          </div>
          <div class="home-imagem">
            <div class="home-img-box">
              <img
                src="img/sabrina.png"
                alt="Sabrina Carpenter"
                class="home-img"
              />
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer class="footer">
      <div class="footer-convite">
        <h2 class="footer-title">Vamos trabalhar juntos?</h2>
        <p class="footer-descricao">
          Transformo suas ideias em projetos reais e de alta qualidade.
        </p>
      </div>
      <div class="footer-container container">
        <div class="footer-base">
          <span class="footer-logo">Sabrina.</span>
          <span class="footer-copyright">&#169; 2026 Sabrina</span>
        </div>
      </div>
    </footer>
  </body>
</html>
